name: "Auto Release"

# Detects unreleased package versions and triggers builds + releases.
# Technical Preview releases use technical-preview-release.yml and preserve
# the public vX.Y.Z-preview.N tag series without changing package metadata.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RELEASE_STABLE to authorize protected release evaluation"
        required: true
        type: string

# Only one release at a time per branch
concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which packages have versions without a matching git tag
  # ---------------------------------------------------------------------------
  detect:
    name: Detect Unreleased Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release-ref: ${{ steps.source.outputs.release_ref }}
      clodex-needs-release: ${{ steps.check.outputs.clodex_needs_release }}
      clodex-version: ${{ steps.check.outputs.clodex_version }}
      clodex-tag: ${{ steps.check.outputs.clodex_tag }}
      clodex-channel: ${{ steps.check.outputs.clodex_channel }}
      karton-needs-release: ${{ steps.check.outputs.karton_needs_release }}
      karton-version: ${{ steps.check.outputs.karton_version }}
      karton-tag: ${{ steps.check.outputs.karton_tag }}

    steps:
      - name: Require exact main dispatch and stable confirmation
        env:
          RELEASE_CONFIRMATION: ${{ inputs.confirm }}
        run: |
          test "$GITHUB_REPOSITORY" = "mereyabdenbekuly-ctrl/clodex-ide"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$RELEASE_CONFIRMATION" = "RELEASE_STABLE"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Require exact current canonical main HEAD
        id: source
        run: |
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$(git rev-parse HEAD)" = "$remote_main"
          test "$GITHUB_SHA" = "$remote_main"
          test "$GITHUB_WORKFLOW_SHA" = "$remote_main"
          echo "release_ref=$remote_main" >> "$GITHUB_OUTPUT"

      - name: Check package versions against tags
        id: check
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          check_package() {
            local name="$1"
            local pkg_json="$2"
            local tag_prefix="$3"

            local version
            version=$(node -p "require('./${pkg_json}').version")
            local tag="${tag_prefix}${version}"
            local previous_version=""
            local channel="release"

            if [[ "$version" =~ -alpha[0-9]{3}$ ]]; then
              channel="alpha"
            elif [[ "$version" =~ -beta[0-9]{3}$ ]]; then
              channel="beta"
            fi

            node scripts/release/validate-release-identity.mjs \
              --product="$name" \
              --channel="$channel" \
              --version="$version" \
              --tag="$tag"

            if [[ "$GITHUB_EVENT_BEFORE" =~ ^[0-9a-f]{40}$ ]] && \
              git cat-file -e "${GITHUB_EVENT_BEFORE}:${pkg_json}" 2>/dev/null; then
              previous_version=$(git show "${GITHUB_EVENT_BEFORE}:${pkg_json}" | node -e '
                let input = "";
                process.stdin.on("data", (chunk) => input += chunk);
                process.stdin.on("end", () => {
                  console.log(JSON.parse(input).version);
                });
              ')
            fi

            echo "Checking ${name}: previous=${previous_version:-none}, version=${version}, expected tag=${tag}"

            if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
              local release_state
              if ! release_state=$(node scripts/release/github-release-state.mjs --tag="${tag}"); then
                echo "::error::Unable to determine whether GitHub Release ${tag} exists"
                return 1
              fi
              case "$release_state" in
                published)
                  echo "  ✅ Tag and published GitHub Release exist — already released and immutable"
                  echo "${name}_needs_release=false" >> "$GITHUB_OUTPUT"
                  ;;
                draft)
                  if [ "$name" != "clodex" ] || [ "$channel" != "release" ]; then
                    echo "::error::Protected draft retry is unsupported for ${name} channel ${channel}; manual recovery is required"
                    return 1
                  fi
                  echo "  🚀 Tag and protected draft exist — retrying exact identity verification and safe resume"
                  echo "${name}_needs_release=true" >> "$GITHUB_OUTPUT"
                  ;;
                absent)
                  echo "  🚀 Tag exists without a GitHub Release — retrying immutable release"
                  echo "${name}_needs_release=true" >> "$GITHUB_OUTPUT"
                  ;;
                *)
                  echo "::error::Unexpected GitHub Release state for ${tag}: ${release_state}"
                  return 1
                  ;;
              esac
            elif [ -n "$previous_version" ] && [ "$previous_version" = "$version" ]; then
              echo "  ✅ Version unchanged and no poisoned tag exists — no release requested"
              echo "${name}_needs_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "  🚀 Tag missing — needs release"
              echo "${name}_needs_release=true" >> "$GITHUB_OUTPUT"
            fi

            echo "${name}_version=${version}" >> "$GITHUB_OUTPUT"
            echo "${name}_tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "${name}_channel=${channel}" >> "$GITHUB_OUTPUT"
          }

          # --- Releasable packages (add new packages here) ---
          check_package "clodex" "apps/browser/package.json" "clodex@"
          check_package "karton" "packages/karton/package.json" "@clodex/karton@"

  # ---------------------------------------------------------------------------
  # Release: clodex (Electron app)
  # ---------------------------------------------------------------------------
  release-clodex:
    name: Release clodex
    needs: detect
    if: needs.detect.outputs.clodex-needs-release == 'true'
    permissions:
      actions: write
      attestations: write
      contents: write
      id-token: write
    uses: ./.github/workflows/_release-browser.yml
    with:
      version: ${{ needs.detect.outputs.clodex-version }}
      tag: ${{ needs.detect.outputs.clodex-tag }}
      channel: ${{ needs.detect.outputs.clodex-channel }}
      ref: ${{ needs.detect.outputs.release-ref }}
      manifest: ${{ needs.detect.outputs.clodex-channel == 'release' && '.release-notes/clodex-stable.json' || '' }}
      draft: ${{ needs.detect.outputs.clodex-channel == 'release' }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Release: karton (npm package)
  # ---------------------------------------------------------------------------
  release-karton:
    name: Release karton
    needs: detect
    if: needs.detect.outputs.karton-needs-release == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/_release-karton.yml
    with:
      version: ${{ needs.detect.outputs.karton-version }}
      tag: ${{ needs.detect.outputs.karton-tag }}
      ref: ${{ needs.detect.outputs.release-ref }}
    secrets: inherit
