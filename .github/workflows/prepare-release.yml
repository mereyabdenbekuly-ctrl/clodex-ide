name: "Prepare Release"

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to release"
        required: true
        type: choice
        options:
          - clodex
          - karton
      channel:
        description: "SemVer channel (technical previews use Technical Preview Release)"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - release
      new-cycle:
        description: "Start new version cycle (abandon current prerelease)"
        required: false
        type: boolean
        default: false

run-name: "Prepare Release Patch: ${{ inputs.package }} (${{ inputs.channel }}${{ inputs.new-cycle && ', new cycle' || '' }})"

permissions:
  contents: read

jobs:
  prepare:
    name: Generate reviewed release patch
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout exact dispatch commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Assert exact canonical main source
        shell: bash
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          test "$DISPATCH_REF" = "refs/heads/main"
          if [[ ! "$DISPATCH_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Dispatch SHA is not an immutable 40-character commit SHA"
            exit 1
          fi

          actual_head=$(git rev-parse HEAD)
          if [ "$actual_head" != "$DISPATCH_SHA" ]; then
            echo "::error::Checkout differs from the dispatch SHA"
            exit 1
          fi

          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 { print $1 }')
          if [ "$remote_main" != "$DISPATCH_SHA" ]; then
            echo "::error::Canonical main moved after this workflow was dispatched; dispatch again from the new main head"
            exit 1
          fi

          if [ -n "$(git status --porcelain=v1 --untracked-files=all)" ]; then
            echo "::error::Exact main checkout is not clean"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate karton channel
        if: inputs.package == 'karton' && inputs.channel != 'release'
        run: |
          echo "::error::Karton only supports the 'release' channel. Prerelease channels are not enabled."
          exit 1

      - name: Validate karton new-cycle
        if: inputs.package == 'karton' && inputs.new-cycle
        run: |
          echo "::error::--new-cycle is not supported for karton."
          exit 1

      - name: Validate new-cycle precondition
        if: inputs.new-cycle && inputs.package == 'clodex'
        run: |
          VERSION=$(node -p "require('./apps/browser/package.json').version")
          # Accepts both the new format (`1.0.0-alpha063`) and the legacy
          # format (`1.0.0-alpha.63`) so repos in either state can start
          # a new cycle.
          if [[ ! "$VERSION" =~ -alpha(\.[0-9]+|[0-9]+)$ ]] && [[ ! "$VERSION" =~ -beta(\.[0-9]+|[0-9]+)$ ]]; then
            echo "::error::Current version $VERSION is not a prerelease. --new-cycle requires a prerelease version."
            exit 1
          fi

      - name: Bump version in the isolated checkout
        id: bump
        shell: bash
        env:
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_NEW_CYCLE: ${{ inputs.new-cycle }}
          RELEASE_PRODUCT: ${{ inputs.package }}
        run: |
          set -euo pipefail

          case "$RELEASE_PRODUCT" in
            clodex|karton) ;;
            *) echo "::error::Unsupported release product"; exit 1 ;;
          esac
          case "$RELEASE_CHANNEL_INPUT" in
            alpha|beta|release) ;;
            *) echo "::error::Unsupported release channel"; exit 1 ;;
          esac

          args=(--package "$RELEASE_PRODUCT" --channel "$RELEASE_CHANNEL_INPUT")
          if [ "$RELEASE_NEW_CYCLE" = "true" ]; then
            args+=(--new-cycle)
          fi

          pnpm tsx scripts/release/index.ts "${args[@]}"
          version=$(cat .release-version)
          tag=$(cat .release-tag)
          node scripts/release/validate-release-identity.mjs \
            --product="$RELEASE_PRODUCT" \
            --channel="$RELEASE_CHANNEL_INPUT" \
            --version="$version" \
            --tag="$tag"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Validate exact generated change set
        shell: bash
        env:
          RELEASE_PRODUCT: ${{ inputs.package }}
        run: |
          set -euo pipefail

          case "$RELEASE_PRODUCT" in
            clodex)
              package_file="apps/browser/package.json"
              changelog_file="apps/browser/CHANGELOG.md"
              ;;
            karton)
              package_file="packages/karton/package.json"
              changelog_file="packages/karton/CHANGELOG.md"
              ;;
            *)
              echo "::error::Unsupported release product"
              exit 1
              ;;
          esac

          required_paths=(
            "$package_file"
            "$changelog_file"
            ".release-version"
            ".release-tag"
            ".release-notes.md"
          )
          custom_notes_path=".release-notes/${RELEASE_PRODUCT}.md"

          declare -A allowed_paths=()
          declare -A changed_paths=()
          for path in "${required_paths[@]}" "$custom_notes_path"; do
            allowed_paths["$path"]=1
          done

          while IFS= read -r -d '' entry; do
            status=${entry:0:2}
            path=${entry:3}
            if [ -z "${allowed_paths[$path]+allowed}" ]; then
              printf '::error::Release preparation changed unexpected path: %q\n' "$path"
              exit 1
            fi
            case "$status" in
              " M") ;;
              " D")
                if [ "$path" != "$custom_notes_path" ]; then
                  printf '::error::Release preparation unexpectedly deleted required path: %q\n' "$path"
                  exit 1
                fi
                ;;
              *)
                printf '::error::Release preparation produced unsupported status %q for %q\n' "$status" "$path"
                exit 1
                ;;
            esac
            changed_paths["$path"]=1
          done < <(git status --porcelain=v1 -z --untracked-files=all)

          for path in "${required_paths[@]}"; do
            if [ -z "${changed_paths[$path]+changed}" ]; then
              printf '::error::Release preparation did not change required generated path: %q\n' "$path"
              exit 1
            fi
          done

          git diff --check

      - name: Build release preparation artifact
        id: bundle
        shell: bash
        env:
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_PRODUCT: ${{ inputs.package }}
          RELEASE_SOURCE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.bump.outputs.tag }}
          RELEASE_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail

          bundle_dir="${RUNNER_TEMP}/release-preparation"
          patch_path="${bundle_dir}/release-preparation.patch"
          changed_files_path="${bundle_dir}/changed-files.txt"
          metadata_path="${bundle_dir}/release-preparation.json"
          instructions_path="${bundle_dir}/APPLY.md"
          mkdir -p "$bundle_dir"

          git diff --binary --full-index --no-ext-diff HEAD > "$patch_path"
          test -s "$patch_path"
          git diff --name-only HEAD > "$changed_files_path"
          patch_sha256=$(sha256sum "$patch_path" | awk '{ print $1 }')

          safe_tag=$(printf '%s\n' "$RELEASE_TAG" | sed 's/@/-/g; s/\//-/g; s/^-//; s/--*/-/g')
          release_branch="release/${safe_tag}"
          git check-ref-format --branch "$release_branch" >/dev/null

          export CHANGED_FILES_PATH="$changed_files_path"
          export METADATA_PATH="$metadata_path"
          export PATCH_SHA256="$patch_sha256"
          node - <<'NODE'
          const fs = require('node:fs');

          const changedFiles = fs
            .readFileSync(process.env.CHANGED_FILES_PATH, 'utf8')
            .split('\n')
            .filter(Boolean);
          const metadata = {
            schemaVersion: 1,
            sourceBranch: 'main',
            sourceCommit: process.env.RELEASE_SOURCE_SHA,
            product: process.env.RELEASE_PRODUCT,
            channel: process.env.RELEASE_CHANNEL_INPUT,
            version: process.env.RELEASE_VERSION,
            tag: process.env.RELEASE_TAG,
            patchSha256: process.env.PATCH_SHA256,
            changedFiles,
          };
          fs.writeFileSync(
            process.env.METADATA_PATH,
            `${JSON.stringify(metadata, null, 2)}\n`,
          );
          NODE

          cat > "$instructions_path" <<EOF
          # Apply the reviewed release patch

          This artifact was generated read-only from exact canonical \`main\` commit
          \`$RELEASE_SOURCE_SHA\`. It did not create a branch, commit, push, or pull request.

          Verify the patch SHA-256 is \`$patch_sha256\`, then apply it from a clean
          clone whose \`origin/main\` still resolves to the exact source commit:

          \`\`\`bash
          git fetch origin main
          test "\$(git rev-parse origin/main)" = "$RELEASE_SOURCE_SHA"
          git switch -c "$release_branch" "$RELEASE_SOURCE_SHA"
          sha256sum -c <(printf '%s  %s\\n' '$patch_sha256' 'release-preparation.patch')
          git apply --index --check release-preparation.patch
          git apply --index release-preparation.patch
          git diff --cached --check
          git commit -s -m "chore($RELEASE_PRODUCT): release $RELEASE_VERSION"
          \`\`\`

          Review every staged change before creating the signed-off commit and pull request.
          EOF

          echo "directory=$bundle_dir" >> "$GITHUB_OUTPUT"
          echo "patch_sha256=$patch_sha256" >> "$GITHUB_OUTPUT"
          echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"

      - name: Upload release preparation artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-preparation-${{ inputs.package }}-${{ steps.bump.outputs.version }}-${{ github.sha }}
          path: ${{ steps.bundle.outputs.directory }}
          if-no-files-found: error
          retention-days: 7

      - name: Summary
        shell: bash
        env:
          PATCH_SHA256: ${{ steps.bundle.outputs.patch_sha256 }}
          RELEASE_BRANCH: ${{ steps.bundle.outputs.release_branch }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_PRODUCT: ${{ inputs.package }}
          RELEASE_SOURCE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.bump.outputs.tag }}
          RELEASE_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          {
            echo "## Read-only release patch generated"
            echo ""
            echo "- **Package:** $RELEASE_PRODUCT"
            echo "- **Version:** $RELEASE_VERSION"
            echo "- **Channel:** $RELEASE_CHANNEL_INPUT"
            echo "- **Tag:** \`$RELEASE_TAG\`"
            echo "- **Exact main source:** \`$RELEASE_SOURCE_SHA\`"
            echo "- **Patch SHA-256:** \`$PATCH_SHA256\`"
            echo ""
            echo "Download the release preparation artifact, verify its hash and source commit, review the patch, and apply the instructions in \`APPLY.md\`."
            echo "The human release owner must create \`$RELEASE_BRANCH\`, apply the patch, review the staged diff, and run:"
            echo ""
            echo "\`git commit -s -m \\\"chore($RELEASE_PRODUCT): release $RELEASE_VERSION\\\"\`"
            echo ""
            echo "This workflow intentionally did not create a commit, push a branch, or open a pull request."
          } >> "$GITHUB_STEP_SUMMARY"
