name: Secret scanning

on:
  push:
    branches:
      - '**'
  pull_request:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed-commits:
    # Keep the protected PR context distinct from the branch-push scan.
    # Otherwise a successful push-range scan can satisfy branch protection
    # before the pull-request base..head scan has completed.
    name: "${{ github.event_name == 'pull_request' && 'Changed commits' || 'Changed commits (push)' }}"
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select commit range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "${EVENT_NAME}" == 'pull_request' ]]; then
            echo "value=${BASE_SHA}..${HEAD_SHA}" >> "${GITHUB_OUTPUT}"
          elif [[ "${BEFORE_SHA}" =~ ^0+$ ]]; then
            echo "value=${HEAD_SHA}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${BEFORE_SHA}..${HEAD_SHA}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Scan changed commits
        run: |
          scripts/security/scan-secrets.sh \
            commits \
            '${{ steps.range.outputs.value }}' \
            security-reports/gitleaks-changed-commits.json

      - name: Upload redacted report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-changed-commits-${{ github.run_id }}
          path: security-reports/gitleaks-changed-commits.json
          if-no-files-found: ignore
          retention-days: 7

  full-history:
    name: Full repository history
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch every branch and tag
        run: |
          git fetch --force --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'

      - name: Scan full history
        run: |
          scripts/security/scan-secrets.sh \
            history \
            security-reports/gitleaks-full-history.json

      - name: Upload redacted report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-full-history-${{ github.run_id }}
          path: security-reports/gitleaks-full-history.json
          if-no-files-found: ignore
          retention-days: 7

