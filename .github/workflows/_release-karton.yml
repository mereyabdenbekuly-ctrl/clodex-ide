name: _Release Karton (Reusable)

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Version to release (e.g., 1.2.3)"
      tag:
        required: true
        type: string
        description: "Git tag to create (e.g., @clodex/karton@1.2.3)"
      ref:
        required: true
        type: string
        description: "Immutable 40-character canonical-main commit SHA"
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  source-gate:
    name: Validate immutable Karton release identity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require canonical main source
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          test "$GITHUB_REPOSITORY" = "mereyabdenbekuly-ctrl/clodex-ide"
          test "$GITHUB_REF" = "refs/heads/main"
          if [[ ! "$RELEASE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Karton release ref must be an immutable lowercase commit SHA"
            exit 1
          fi
          test "$GITHUB_SHA" = "$RELEASE_REF"
          test "$GITHUB_WORKFLOW_SHA" = "$RELEASE_REF"

      - name: Checkout exact release source without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate Karton version and tag
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node scripts/release/validate-release-identity.mjs \
            --product=karton \
            --channel=release \
            --tag="$RELEASE_TAG" \
            --version="$RELEASE_VERSION"
          package_version=$(node -p 'require("./packages/karton/package.json").version')
          test "$package_version" = "$RELEASE_VERSION"

      - name: Require exact current canonical main HEAD
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"

  # Create the git tag from the current commit
  tag:
    needs: source-gate
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Create exact lightweight tag through GitHub API (idempotent)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"
          remote_tag=$(git ls-remote origin "refs/tags/${RELEASE_TAG}" | awk 'NR == 1 {print $1}')
          if [ -n "$remote_tag" ]; then
            git fetch --force --no-tags origin \
              "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            existing_commit=$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")
            test "$existing_commit" = "$RELEASE_REF"
            echo "Tag $RELEASE_TAG already targets the exact release commit"
            exit 0
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${RELEASE_TAG}" \
            -f "sha=${RELEASE_REF}"

  publish:
    needs: [source-gate, tag]
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @clodex/karton build

      - name: Reassert exact main and tag immediately before npm publication
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          test "$(node -p 'require("./packages/karton/package.json").version')" = "$RELEASE_VERSION"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_commit=$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")
          test "$tag_commit" = "$RELEASE_REF"

      - name: Publish to npm
        working-directory: packages/karton
        run: npm publish --tag latest --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: [source-gate, tag, publish]
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write

    steps:
      - name: Checkout exact release source without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Reassert exact main and tag immediately before GitHub Release
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_commit=$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")
          test "$tag_commit" = "$RELEASE_REF"

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "Karton ${{ inputs.version }}"
          body: |
            **@clodex/karton ${{ inputs.version }}**

            ```bash
            npm install @clodex/karton@${{ inputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
