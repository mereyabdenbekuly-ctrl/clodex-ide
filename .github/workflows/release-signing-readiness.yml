name: "Release Signing Readiness"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref containing the readiness contract"
        required: false
        type: string
        default: main
      artifact_set:
        description: "Artifact set whose signing contract should be checked"
        required: false
        type: choice
        default: macos
        options:
          - macos
          - windows
          - all
      check_macos_keychain:
        description: "Import the P12 and verify the configured Developer ID identity"
        required: false
        type: boolean
        default: true

run-name: "Release signing readiness: ${{ inputs.ref }}"

permissions:
  contents: read

jobs:
  contract:
    name: Validate Release environment contract
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout contract
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Validate signing and update-server contract
        id: signing-readiness
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
          AZURE_ACCOUNT_ENDPOINT_URI: ${{ secrets.AZURE_ACCOUNT_ENDPOINT_URI }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          UPDATE_SERVER_ORIGIN: ${{ vars.UPDATE_SERVER_ORIGIN }}
        run: >-
          node scripts/release/signing-readiness.mjs
          --artifacts=${{ inputs.artifact_set }}
          --github-annotations
          --report=${{ runner.temp }}/release-signing-readiness.json
          --summary=${{ runner.temp }}/release-signing-readiness.md

      - name: Publish readiness summary
        if: always() && steps.signing-readiness.outcome != 'skipped'
        run: cat "${{ runner.temp }}/release-signing-readiness.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload content-free readiness report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-signing-readiness-contract
          path: ${{ runner.temp }}/release-signing-readiness.json
          retention-days: 30
          if-no-files-found: error

  macos-keychain:
    name: Verify Developer ID keychain identity
    needs: contract
    if: inputs.check_macos_keychain && inputs.artifact_set != 'windows'
    runs-on: macos-26
    environment: Release
    steps:
      - name: Checkout contract
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Import macOS signing certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: Validate Developer ID identity
        id: developer-id-readiness
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
          AZURE_ACCOUNT_ENDPOINT_URI: ${{ secrets.AZURE_ACCOUNT_ENDPOINT_URI }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          UPDATE_SERVER_ORIGIN: ${{ vars.UPDATE_SERVER_ORIGIN }}
        run: >-
          node scripts/release/signing-readiness.mjs
          --artifacts=${{ inputs.artifact_set }}
          --check-keychain
          --github-annotations
          --report=${{ runner.temp }}/macos-developer-id-readiness.json
          --summary=${{ runner.temp }}/macos-developer-id-readiness.md

      - name: Publish Developer ID summary
        if: always() && steps.developer-id-readiness.outcome != 'skipped'
        run: cat "${{ runner.temp }}/macos-developer-id-readiness.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload content-free Developer ID report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos-developer-id-readiness
          path: ${{ runner.temp }}/macos-developer-id-readiness.json
          retention-days: 30
          if-no-files-found: error
