name: "Release Signing Readiness"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Readiness contract source (must be exactly main)"
        required: false
        type: string
        default: main
      artifact_set:
        description: "Artifact set whose signing contract should be checked"
        required: false
        type: choice
        default: macos
        options:
          - macos
          - windows
          - all
      release_channel:
        description: "Release channel whose pre-tag contract should be checked"
        required: false
        type: choice
        default: release
        options:
          - preview
          - alpha
          - beta
          - nightly
          - release
      check_macos_keychain:
        description: "Import the P12 and verify the configured Developer ID identity"
        required: false
        type: boolean
        default: true

run-name: "Release signing readiness: ${{ inputs.ref }}"

permissions:
  contents: read

jobs:
  source-gate:
    name: Verify trusted readiness source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_ref: ${{ steps.source.outputs.release_ref }}
    steps:
      - name: Require canonical main inputs
        shell: bash
        env:
          ARTIFACT_SET: ${{ inputs.artifact_set }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.release_channel }}
          RELEASE_REF_INPUT: ${{ inputs.ref }}
        run: |
          test "$GITHUB_REPOSITORY" = "mereyabdenbekuly-ctrl/clodex-ide"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$RELEASE_REF_INPUT" = "main"
          case "$ARTIFACT_SET" in
            macos|windows|all) ;;
            *) echo "::error::Unsupported signing artifact set"; exit 1 ;;
          esac
          case "$RELEASE_CHANNEL_INPUT" in
            preview|alpha|beta|nightly|release) ;;
            *) echo "::error::Unsupported release channel"; exit 1 ;;
          esac

      - name: Checkout canonical main without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Require exact current canonical main HEAD
        id: source
        shell: bash
        run: |
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$(git rev-parse HEAD)" = "$remote_main"
          test "$GITHUB_SHA" = "$remote_main"
          test "$GITHUB_WORKFLOW_SHA" = "$remote_main"
          echo "release_ref=$remote_main" >> "$GITHUB_OUTPUT"

  contract:
    name: Validate Release environment contract
    needs: source-gate
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout contract
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.source-gate.outputs.release_ref }}
          persist-credentials: false

      - name: Reassert exact current main after protected approval
        shell: bash
        env:
          RELEASE_REF: ${{ needs.source-gate.outputs.release_ref }}
        run: |
          test "$GITHUB_REPOSITORY" = "mereyabdenbekuly-ctrl/clodex-ide"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_SHA" = "$RELEASE_REF"
          test "$GITHUB_WORKFLOW_SHA" = "$RELEASE_REF"
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"

      - name: Validate signing and update-server contract
        id: signing-readiness
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
          AZURE_ACCOUNT_ENDPOINT_URI: ${{ secrets.AZURE_ACCOUNT_ENDPOINT_URI }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          READINESS_ARTIFACT_SET: ${{ inputs.artifact_set }}
          READINESS_CHANNEL: ${{ inputs.release_channel }}
          READINESS_REPORT: ${{ runner.temp }}/release-signing-readiness.json
          READINESS_SUMMARY: ${{ runner.temp }}/release-signing-readiness.md
          UPDATE_SERVER_ORIGIN: ${{ vars.UPDATE_SERVER_ORIGIN }}
        shell: bash
        run: |
          node scripts/release/signing-readiness.mjs \
            --artifacts="$READINESS_ARTIFACT_SET" \
            --channel="$READINESS_CHANNEL" \
            --github-annotations \
            --report="$READINESS_REPORT" \
            --summary="$READINESS_SUMMARY"

      - name: Publish readiness summary
        if: always() && steps.signing-readiness.outcome != 'skipped'
        shell: bash
        env:
          READINESS_SUMMARY: ${{ runner.temp }}/release-signing-readiness.md
        run: cat "$READINESS_SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload content-free readiness report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-signing-readiness-contract
          path: ${{ runner.temp }}/release-signing-readiness.json
          retention-days: 30
          if-no-files-found: error

  macos-keychain:
    name: Verify Developer ID keychain identity
    needs: [source-gate, contract]
    if: inputs.check_macos_keychain && inputs.artifact_set != 'windows'
    runs-on: macos-26
    environment: Release
    steps:
      - name: Checkout contract
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.source-gate.outputs.release_ref }}
          persist-credentials: false

      - name: Reassert exact current main before certificate import
        shell: bash
        env:
          RELEASE_REF: ${{ needs.source-gate.outputs.release_ref }}
        run: |
          test "$GITHUB_REPOSITORY" = "mereyabdenbekuly-ctrl/clodex-ide"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_SHA" = "$RELEASE_REF"
          test "$GITHUB_WORKFLOW_SHA" = "$RELEASE_REF"
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"

      - name: Import macOS signing certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: Validate Developer ID identity
        id: developer-id-readiness
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
          AZURE_ACCOUNT_ENDPOINT_URI: ${{ secrets.AZURE_ACCOUNT_ENDPOINT_URI }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          READINESS_ARTIFACT_SET: ${{ inputs.artifact_set }}
          READINESS_CHANNEL: ${{ inputs.release_channel }}
          READINESS_REPORT: ${{ runner.temp }}/macos-developer-id-readiness.json
          READINESS_SUMMARY: ${{ runner.temp }}/macos-developer-id-readiness.md
          UPDATE_SERVER_ORIGIN: ${{ vars.UPDATE_SERVER_ORIGIN }}
        shell: bash
        run: |
          node scripts/release/signing-readiness.mjs \
            --artifacts="$READINESS_ARTIFACT_SET" \
            --channel="$READINESS_CHANNEL" \
            --check-keychain \
            --github-annotations \
            --report="$READINESS_REPORT" \
            --summary="$READINESS_SUMMARY"

      - name: Publish Developer ID summary
        if: always() && steps.developer-id-readiness.outcome != 'skipped'
        shell: bash
        env:
          READINESS_SUMMARY: ${{ runner.temp }}/macos-developer-id-readiness.md
        run: cat "$READINESS_SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload content-free Developer ID report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos-developer-id-readiness
          path: ${{ runner.temp }}/macos-developer-id-readiness.json
          retention-days: 30
          if-no-files-found: error
