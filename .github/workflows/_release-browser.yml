name: _Release Browser (Reusable)

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Version to release (e.g., 1.0.0-alpha001)"
      tag:
        required: true
        type: string
        description: "Git tag to create (e.g., clodex@1.0.0-alpha001)"
      channel:
        required: true
        type: string
        description: "Release channel (preview, alpha, beta, nightly, release)"
      ref:
        required: true
        type: string
        description: "Immutable 40-character commit SHA to tag, build, and release"
      manifest:
        required: false
        type: string
        default: ""
        description: "Committed schema-v2 release plan; mandatory for preview and stable promotion"
      draft:
        required: false
        type: boolean
        default: false
        description: "Stage the GitHub Release as a non-public draft"
    secrets:
      POSTHOG_API_KEY:
        required: false
      SUPABASE_URL:
        required: false
      SUPABASE_PUBLISHABLE_KEY:
        required: false
      VITE_POSTHOG_API_KEY:
        required: false
      APPLE_ID:
        required: false
      APPLE_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPLE_SIGNING_IDENTITY:
        required: false
      MACOS_CERT_P12_BASE64:
        required: false
      MACOS_CERT_P12_PASSWORD:
        required: false
      # PostHog CLI secrets (source map upload)
      POSTHOG_CLI_API_KEY:
        required: false
      POSTHOG_CLI_PROJECT_ID:
        required: false
      # Azure Trusted Signing secrets (Windows code signing)
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_ACCOUNT_NAME:
        required: false
      AZURE_ACCOUNT_ENDPOINT_URI:
        required: false
      AZURE_CERTIFICATE_PROFILE_NAME:
        required: false
      CLODEX_EVIDENCE_MEMORY_PROMOTION_PUBLIC_KEY:
        required: false

permissions:
  contents: read

jobs:
  source-gate:
    name: Verify canonical main release source
    runs-on: ubuntu-latest
    permissions:
      attestations: read
      contents: read
    outputs:
      release_plan_sha256: ${{ steps.binding.outputs.release_plan_sha256 }}
      trusted_promotion: ${{ steps.binding.outputs.trusted_promotion }}
    steps:
      - name: Validate immutable canonical-main inputs
        shell: bash
        env:
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          test "$GITHUB_REPOSITORY" = "mereyabdenbekuly-ctrl/clodex-ide"
          test "$GITHUB_REF" = "refs/heads/main"
          case "$RELEASE_CHANNEL_INPUT" in
            preview|alpha|beta|nightly|release) ;;
            *)
              echo "::error::Unsupported release channel: $RELEASE_CHANNEL_INPUT"
              exit 1
              ;;
          esac
          if [[ ! "$RELEASE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release ref must be an immutable 40-character lowercase commit SHA"
            exit 1
          fi
          test "$GITHUB_SHA" = "$RELEASE_REF"
          test "$GITHUB_WORKFLOW_SHA" = "$RELEASE_REF"

      - name: Checkout exact release source without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate canonical channel, version, and tag identity
        shell: bash
        env:
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node scripts/release/validate-release-identity.mjs \
            --channel="$RELEASE_CHANNEL_INPUT" \
            --tag="$RELEASE_TAG" \
            --version="$RELEASE_VERSION"

      - name: Require exact current canonical main HEAD
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"

      - name: Verify manifest, trusted evidence, and live prerequisite chain
        id: binding
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_DRAFT: ${{ inputs.draft }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [ "$RELEASE_CHANNEL_INPUT" != "preview" ] && [ "$RELEASE_CHANNEL_INPUT" != "release" ]; then
            if [ -n "$RELEASE_MANIFEST" ]; then
              echo "::error::Only preview/stable releases may supply a promotion manifest"
              exit 1
            fi
            echo "release_plan_sha256=" >> "$GITHUB_OUTPUT"
            echo "trusted_promotion=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$RELEASE_MANIFEST" ]; then
            echo "::error::A committed schema-v2 release manifest is mandatory"
            exit 1
          fi
          expected_kind=stable
          if [ "$RELEASE_CHANNEL_INPUT" = "preview" ]; then
            expected_kind=technical-preview
          fi
          env \
            -u ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -u ACTIONS_ID_TOKEN_REQUEST_URL \
            -u ACTIONS_RUNTIME_TOKEN \
            -u GITHUB_ENV \
            -u GITHUB_OUTPUT \
            -u GITHUB_PATH \
            -u GITHUB_STEP_SUMMARY \
            node scripts/release/verify-release-promotion.mjs \
            --manifest="$RELEASE_MANIFEST" \
            --repository="$GITHUB_REPOSITORY" \
            --expected-kind="$expected_kind" \
            --expected-version="$RELEASE_VERSION" \
            --expected-tag="$RELEASE_TAG"
          expected_draft=$(node -p '
            const plan = JSON.parse(require("node:fs").readFileSync(process.env.RELEASE_MANIFEST, "utf8"));
            String(plan.distribution.githubReleaseState === "draft");
          ')
          if [ "$expected_draft" != "$RELEASE_DRAFT" ]; then
            echo "::error::Release draft input differs from the committed manifest"
            exit 1
          fi
          release_plan_sha256=$(shasum -a 256 "$RELEASE_MANIFEST" | awk '{print $1}')
          echo "release_plan_sha256=$release_plan_sha256" >> "$GITHUB_OUTPUT"
          echo "trusted_promotion=true" >> "$GITHUB_OUTPUT"

  promotion-gate:
    name: Validate release safety gates
    needs: source-gate
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      attestations: read
      contents: read
    steps:
      - name: Checkout verified release candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Reassert exact current main after protected approval
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          test "$GITHUB_SHA" = "$RELEASE_REF"
          test "$GITHUB_WORKFLOW_SHA" = "$RELEASE_REF"
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"

      - name: Reverify live promotion authorization after protected approval
        if: needs.source-gate.outputs.trusted_promotion == 'true'
        shell: bash
        env:
          EXPECTED_RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          actual_sha256=$(shasum -a 256 "$RELEASE_MANIFEST" | awk '{print $1}')
          test "$actual_sha256" = "$EXPECTED_RELEASE_PLAN_SHA256"
          expected_kind=stable
          if [ "$RELEASE_CHANNEL_INPUT" = "preview" ]; then
            expected_kind=technical-preview
          fi
          env \
            -u ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -u ACTIONS_ID_TOKEN_REQUEST_URL \
            -u ACTIONS_RUNTIME_TOKEN \
            -u GITHUB_ENV \
            -u GITHUB_OUTPUT \
            -u GITHUB_PATH \
            -u GITHUB_STEP_SUMMARY \
            node scripts/release/verify-release-promotion.mjs \
            --manifest="$RELEASE_MANIFEST" \
            --repository="$GITHUB_REPOSITORY" \
            --expected-kind="$expected_kind" \
            --expected-version="$RELEASE_VERSION" \
            --expected-tag="$RELEASE_TAG"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test "$remote_main" = "$RELEASE_REF"

      - name: Validate signing and update-server contract
        id: signing-readiness
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
          AZURE_ACCOUNT_ENDPOINT_URI: ${{ secrets.AZURE_ACCOUNT_ENDPOINT_URI }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          SIGNING_REPORT: ${{ runner.temp }}/release-signing-readiness.json
          SIGNING_SUMMARY: ${{ runner.temp }}/release-signing-readiness.md
          UPDATE_SERVER_ORIGIN: ${{ vars.UPDATE_SERVER_ORIGIN }}
        shell: bash
        run: |
          node scripts/release/signing-readiness.mjs \
            --artifacts=all \
            --channel="$RELEASE_CHANNEL_INPUT" \
            --github-annotations \
            --report="$SIGNING_REPORT" \
            --summary="$SIGNING_SUMMARY"

      - name: Publish signing readiness summary
        if: always() && steps.signing-readiness.outcome != 'skipped'
        shell: bash
        env:
          SIGNING_SUMMARY: ${{ runner.temp }}/release-signing-readiness.md
        run: cat "$SIGNING_SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload signing readiness report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clodex-signing-readiness-${{ inputs.channel }}
          path: ${{ runner.temp }}/release-signing-readiness.json
          retention-days: 30
          if-no-files-found: error

      - name: Skip isolated runtime gates for nightly
        if: inputs.channel == 'nightly'
        run: echo "Nightly uses its separately validated default-on canary policy."

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit the exact release dependency graph before release effects
        run: pnpm security:dependencies

      - name: Validate desktop attribution and redistribution rights
        shell: bash
        env:
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
        run: |
          pnpm --dir apps/browser release:attribution:check -- \
            --channel="$VALIDATION_CHANNEL"

      - name: Validate isolated agent runtime promotion evidence
        if: inputs.channel == 'release'
        run: pnpm --dir apps/browser check:isolated-agent-runtime-promotion

      - name: Validate Evidence Memory release gate
        if: inputs.channel != 'nightly'
        run: |
          pnpm --dir apps/browser check:evidence-memory-promotion
          pnpm --dir apps/browser check:evidence-memory-rollout
        env:
          EVIDENCE_MEMORY_RELEASE_CHANNEL: ${{ inputs.channel == 'release' && 'release' || 'prerelease' }}
          CLODEX_EVIDENCE_MEMORY_PROMOTION_PUBLIC_KEY: ${{ secrets.CLODEX_EVIDENCE_MEMORY_PROMOTION_PUBLIC_KEY }}

      - name: Evaluate Agentic App Runtime release gates
        if: inputs.channel != 'nightly'
        run: |
          pnpm --dir apps/browser eval:agentic-app-runtime
          pnpm --dir apps/browser check:agentic-app-runtime-evaluation
          pnpm --dir apps/browser check:agentic-app-runtime-promotion

      - name: Validate main plan closure gate
        if: inputs.channel != 'nightly'
        shell: bash
        run: |
          pnpm --dir apps/browser check:main-plan-readiness -- \
            --channel "$MAIN_PLAN_CHANNEL" \
            --require-clean \
            --out test-results/main-plan-readiness.json
        env:
          CLODEX_EVIDENCE_MEMORY_PROMOTION_PUBLIC_KEY: ${{ secrets.CLODEX_EVIDENCE_MEMORY_PROMOTION_PUBLIC_KEY }}
          MAIN_PLAN_CHANNEL: ${{ inputs.channel == 'release' && 'release' || 'prerelease' }}

      - name: Upload main plan readiness report
        if: always() && inputs.channel != 'nightly'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clodex-main-plan-readiness-${{ inputs.channel }}
          path: apps/browser/test-results/main-plan-readiness.json
          retention-days: 30
          if-no-files-found: error

      - name: Validate isolated agent runtime prerelease observation build
        if: inputs.channel == 'preview' || inputs.channel == 'alpha' || inputs.channel == 'beta'
        run: pnpm --dir apps/browser check:isolated-agent-runtime-observation-build
        env:
          RELEASE_CHANNEL: prerelease
          APP_VERSION_OVERRIDE: ${{ inputs.version }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}

      - name: Validate Agentic App Runtime prerelease observation build
        if: inputs.channel == 'preview' || inputs.channel == 'alpha' || inputs.channel == 'beta'
        run: pnpm --dir apps/browser check:agentic-app-runtime-observation-build
        env:
          RELEASE_CHANNEL: prerelease
          APP_VERSION_OVERRIDE: ${{ inputs.version }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}

      - name: Validate update rollout and rollback contracts
        if: inputs.channel != 'nightly'
        run: pnpm --dir apps/update-server test

  tag-authorization:
    name: Reauthorize exact release state before tagging
    needs: [source-gate, promotion-gate, build]
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      attestations: read
      contents: read
    outputs:
      authorized_ref: ${{ steps.authorization.outputs.authorized_ref }}
      release_plan_sha256: ${{ steps.authorization.outputs.release_plan_sha256 }}
      run_attempt: ${{ steps.authorization.outputs.run_attempt }}
      run_id: ${{ steps.authorization.outputs.run_id }}
    steps:
      - name: Checkout exact release source without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Reverify live promotion with a read-only token
        id: authorization
        shell: bash
        env:
          EXPECTED_RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test "$remote_main" = "$RELEASE_REF"
          actual_sha256=""
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            actual_sha256=$(shasum -a 256 "$RELEASE_MANIFEST" | awk '{print $1}')
            test "$actual_sha256" = "$EXPECTED_RELEASE_PLAN_SHA256"
            expected_kind=stable
            if [ "$RELEASE_CHANNEL_INPUT" = "preview" ]; then
              expected_kind=technical-preview
            fi
            env \
              -u ACTIONS_ID_TOKEN_REQUEST_TOKEN \
              -u ACTIONS_ID_TOKEN_REQUEST_URL \
              -u ACTIONS_RUNTIME_TOKEN \
              -u GITHUB_ENV \
              -u GITHUB_OUTPUT \
              -u GITHUB_PATH \
              -u GITHUB_STEP_SUMMARY \
              node scripts/release/verify-release-promotion.mjs \
              --manifest="$RELEASE_MANIFEST" \
              --repository="$GITHUB_REPOSITORY" \
              --expected-kind="$expected_kind" \
              --expected-version="$RELEASE_VERSION" \
              --expected-tag="$RELEASE_TAG"
          fi
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test "$remote_main" = "$RELEASE_REF"
          echo "authorized_ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          echo "release_plan_sha256=$actual_sha256" >> "$GITHUB_OUTPUT"
          echo "run_attempt=$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
          echo "run_id=$GITHUB_RUN_ID" >> "$GITHUB_OUTPUT"

  # Create the git tag only after build and read-only reauthorization.
  tag:
    needs: [source-gate, build, tag-authorization]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Create exact lightweight tag through GitHub API
        env:
          AUTHORIZED_REF: ${{ needs.tag-authorization.outputs.authorized_ref }}
          AUTHORIZED_RELEASE_PLAN_SHA256: ${{ needs.tag-authorization.outputs.release_plan_sha256 }}
          AUTHORIZED_RUN_ATTEMPT: ${{ needs.tag-authorization.outputs.run_attempt }}
          AUTHORIZED_RUN_ID: ${{ needs.tag-authorization.outputs.run_id }}
          EXPECTED_RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
        run: |
          test "$AUTHORIZED_REF" = "$RELEASE_REF"
          test "$AUTHORIZED_RUN_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
          test "$AUTHORIZED_RUN_ID" = "$GITHUB_RUN_ID"
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            test "$AUTHORIZED_RELEASE_PLAN_SHA256" = "$EXPECTED_RELEASE_PLAN_SHA256"
            actual_sha256=$(shasum -a 256 "$RELEASE_MANIFEST" | awk '{print $1}')
            test "$actual_sha256" = "$EXPECTED_RELEASE_PLAN_SHA256"
          else
            test -z "$AUTHORIZED_RELEASE_PLAN_SHA256"
          fi
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"
          remote_tag=$(git ls-remote origin "refs/tags/${RELEASE_TAG}" | awk 'NR == 1 {print $1}')
          if [ -n "$remote_tag" ]; then
            git fetch --force --no-tags origin \
              "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            existing_commit=$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")
            test "$existing_commit" = "$RELEASE_REF"
            echo "Tag $RELEASE_TAG already targets the exact release commit"
            exit 0
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${RELEASE_TAG}" \
            -f "sha=${RELEASE_REF}"

      - name: Read release notes
        id: notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          PACKAGE_DIR="apps/browser"
          VERSION="$RELEASE_VERSION"

          NOTES=""
          if [ -f "$PACKAGE_DIR/CHANGELOG.md" ]; then
            NOTES=$(sed -n "/## ${VERSION}/,/## [0-9]/p" "$PACKAGE_DIR/CHANGELOG.md" | head -n -1)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi

          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

    outputs:
      notes: ${{ steps.notes.outputs.notes }}

  build:
    needs: [source-gate, promotion-gate]
    environment: Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            arch: arm64
            artifact: clodex-macos-arm64
          - os: macos-26-intel
            arch: x64
            artifact: clodex-macos-x64
          - os: ubuntu-latest
            arch: x64
            artifact: clodex-linux-x64
          - os: windows-latest # explicit arch label; avoids breakage if GitHub adds ARM runners under windows-latest
            arch: x64
            artifact: clodex-windows-x64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
      API_URL: ${{ vars.API_URL }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      CLODEX_CONSOLE_URL: ${{ vars.CLODEX_CONSOLE_URL }}
      VITE_CLODEX_CONSOLE_URL: ${{ vars.VITE_CLODEX_CONSOLE_URL }}
      LLM_PROXY_URL: ${{ vars.LLM_PROXY_URL }}
      VITE_DISABLE_TELEMETRY: ${{ vars.VITE_DISABLE_TELEMETRY }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      UPDATE_SERVER_ORIGIN: ${{ vars.UPDATE_SERVER_ORIGIN }}
      VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
      # PostHog CLI (source map upload during packaging)
      POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
      POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_CLI_PROJECT_ID }}
      POSTHOG_CLI_HOST: ${{ vars.POSTHOG_CLI_HOST }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Assert immutable release candidate checkout
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          actual_ref=$(git rev-parse HEAD)
          if [ "$actual_ref" != "$RELEASE_REF" ]; then
            echo "::error::Release checkout mismatch: expected $RELEASE_REF, got $actual_ref"
            exit 1
          fi
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          if [ -z "$remote_main" ] || [ "$remote_main" != "$RELEASE_REF" ]; then
            echo "::error::Canonical main moved before protected build: expected $RELEASE_REF, got ${remote_main:-missing}"
            exit 1
          fi
          test "$GITHUB_SHA" = "$RELEASE_REF"
          test "$GITHUB_WORKFLOW_SHA" = "$RELEASE_REF"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Apply release version to package metadata
        run: |
          node -e '
            const fs = require("node:fs");
            const path = "apps/browser/package.json";
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          '
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Import macOS signing certs
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: Setup Windows code signing (Azure Trusted Signing)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AZURE_ACCOUNT_ENDPOINT_URI_INPUT: ${{ secrets.AZURE_ACCOUNT_ENDPOINT_URI }}
          AZURE_ACCOUNT_NAME_INPUT: ${{ secrets.AZURE_ACCOUNT_NAME }}
          AZURE_CERTIFICATE_PROFILE_NAME_INPUT: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
        run: |
          # Install Azure.CodeSigning.Dlib via NuGet
          $nugetDir = Join-Path $env:RUNNER_TEMP 'nuget'
          New-Item -ItemType Directory -Force -Path $nugetDir | Out-Null
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.95 -OutputDirectory $nugetDir -Source https://api.nuget.org/v3/index.json

          # Find the installed dlib
          $dlibPath = Get-ChildItem -Path $nugetDir -Recurse -Filter "Azure.CodeSigning.Dlib.dll" |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $dlibPath) {
            Write-Error "Failed to find Azure.CodeSigning.Dlib.dll"
            exit 1
          }

          # Find signtool.exe from Windows SDK
          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\bin"
          $signtoolPath = Get-ChildItem -Path $sdkPath -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object { [version]($_.Directory.Parent.Name -replace '^(\d+\.\d+\.\d+\.\d+).*', '$1') } -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtoolPath) {
            Write-Error "Failed to find signtool.exe in Windows SDK"
            exit 1
          }

          # Create metadata.json for Azure Trusted Signing
          $metadataPath = Join-Path $env:RUNNER_TEMP 'metadata.json'
          $metadataContent = [ordered]@{
            Endpoint = $env:AZURE_ACCOUNT_ENDPOINT_URI_INPUT
            CodeSigningAccountName = $env:AZURE_ACCOUNT_NAME_INPUT
            CertificateProfileName = $env:AZURE_CERTIFICATE_PROFILE_NAME_INPUT
          } | ConvertTo-Json -Compress
          [System.IO.File]::WriteAllText($metadataPath, $metadataContent, [System.Text.UTF8Encoding]::new($false))

          # Export environment variables for subsequent steps
          echo "SIGNTOOL_PATH=$signtoolPath" >> $env:GITHUB_ENV
          echo "AZURE_CODE_SIGNING_DLIB=$dlibPath" >> $env:GITHUB_ENV
          echo "AZURE_METADATA_JSON=$metadataPath" >> $env:GITHUB_ENV

          Write-Host "Azure Trusted Signing configured"

      - name: Install Linux package validation dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cpio rpm xvfb

      - run: pnpm build

      - name: Build Electron App
        working-directory: apps/browser
        shell: bash
        run: pnpm make "--arch=$RELEASE_ARCH"
        env:
          BUILD_MODE: production
          # macOS signing
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Windows signing (Azure Trusted Signing)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # Release channel
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
          APP_VERSION_OVERRIDE: ${{ inputs.version }}

      - name: Notarize and staple macOS DMG
        if: runner.os == 'macOS'
        working-directory: apps/browser
        timeout-minutes: 30
        shell: bash
        run: |
          pnpm release:notarize:dmg -- \
            --arch="$RELEASE_ARCH" \
            --channel="$VALIDATION_CHANNEL" \
            --version="$RELEASE_VERSION"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_VERSION: ${{ inputs.version }}
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}

      - name: Validate macOS release artifacts
        if: runner.os == 'macOS'
        working-directory: apps/browser
        timeout-minutes: 5
        shell: bash
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
          UPDATE_SERVER_ORIGIN: ${{ vars.UPDATE_SERVER_ORIGIN }}
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
        run: |
          args=(
            --skip-make
            --ui-launch
            "--arch=$RELEASE_ARCH"
            "--channel=$VALIDATION_CHANNEL"
            "--version=$RELEASE_VERSION"
          )
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            args+=(
              --require-trusted-binding
              --source-commit="$RELEASE_REF"
              --tag="$RELEASE_TAG"
              --release-plan="$RELEASE_MANIFEST"
              --release-plan-sha256="$RELEASE_PLAN_SHA256"
            )
          fi
          pnpm release:validate:macos -- "${args[@]}"

      - name: Validate Windows release artifacts
        if: runner.os == 'Windows'
        working-directory: apps/browser
        timeout-minutes: 5
        shell: bash
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
        run: |
          args=(
            --platform=windows
            "--arch=$RELEASE_ARCH"
            "--channel=$VALIDATION_CHANNEL"
            "--version=$RELEASE_VERSION"
          )
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            args+=(
              --require-trusted-binding
              --source-commit="$RELEASE_REF"
              --tag="$RELEASE_TAG"
              --release-plan="$RELEASE_MANIFEST"
              --release-plan-sha256="$RELEASE_PLAN_SHA256"
            )
          fi
          pnpm release:validate:artifacts -- "${args[@]}"

      - name: Smoke test Windows installer and uninstall
        if: runner.os == 'Windows'
        working-directory: apps/browser
        shell: pwsh
        timeout-minutes: 10
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_VERSION: ${{ inputs.version }}
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
        run: |
          & ./scripts/smoke-windows-installer.ps1 `
            -Channel $env:VALIDATION_CHANNEL `
            -Arch $env:RELEASE_ARCH `
            -Version $env:RELEASE_VERSION

      - name: Validate Linux release artifacts
        if: runner.os == 'Linux'
        working-directory: apps/browser
        timeout-minutes: 5
        shell: bash
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
        run: |
          args=(
            --platform=linux
            "--arch=$RELEASE_ARCH"
            "--channel=$VALIDATION_CHANNEL"
            "--version=$RELEASE_VERSION"
          )
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            args+=(
              --require-trusted-binding
              --source-commit="$RELEASE_REF"
              --tag="$RELEASE_TAG"
              --release-plan="$RELEASE_MANIFEST"
              --release-plan-sha256="$RELEASE_PLAN_SHA256"
            )
          fi
          pnpm release:validate:artifacts -- "${args[@]}"

      - name: Smoke test Debian installer and uninstall
        if: runner.os == 'Linux'
        working-directory: apps/browser
        timeout-minutes: 10
        shell: bash
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_VERSION: ${{ inputs.version }}
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
        run: |
          pnpm release:smoke:linux-installer -- \
            "$VALIDATION_CHANNEL" \
            "$RELEASE_ARCH" \
            "$RELEASE_VERSION"

      - name: List build output
        working-directory: apps/browser
        run: find out -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.nupkg" -o -name "RELEASES*" -o -name "*.deb" -o -name "*.rpm" -o -name "*.zip" \) 2>/dev/null || true
        shell: bash

      - name: Stage manifest-bound release assets
        shell: bash
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_PLATFORM: ${{ runner.os == 'macOS' && 'macos' || runner.os == 'Windows' && 'windows' || 'linux' }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
        run: |
          args=(
            stage
            --manifest="apps/browser/out/${VALIDATION_CHANNEL}/validation/${RELEASE_PLATFORM}-${RELEASE_ARCH}-${RELEASE_VERSION}.json"
            --output="${RUNNER_TEMP}/clodex-release-bundle"
          )
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            args+=(--trusted-promotion=true)
          fi
          node apps/browser/scripts/release-publication.mjs "${args[@]}"

      - name: Upload manifest-bound release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/clodex-release-bundle/
          if-no-files-found: error

  release-authorization:
    name: Reauthorize exact release state before GitHub Release creation
    needs: [source-gate, tag, build]
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      attestations: read
      contents: read
    outputs:
      authorized_ref: ${{ steps.authorization.outputs.authorized_ref }}
      release_plan_sha256: ${{ steps.authorization.outputs.release_plan_sha256 }}
      run_attempt: ${{ steps.authorization.outputs.run_attempt }}
      run_id: ${{ steps.authorization.outputs.run_id }}
    steps:
      - name: Checkout exact release source without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Reverify live promotion and tag with a read-only token
        id: authorization
        shell: bash
        env:
          EXPECTED_RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test "$remote_main" = "$RELEASE_REF"
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          test "$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")" = "$RELEASE_REF"
          actual_sha256=""
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            actual_sha256=$(shasum -a 256 "$RELEASE_MANIFEST" | awk '{print $1}')
            test "$actual_sha256" = "$EXPECTED_RELEASE_PLAN_SHA256"
            expected_kind=stable
            if [ "$RELEASE_CHANNEL_INPUT" = "preview" ]; then
              expected_kind=technical-preview
            fi
            env \
              -u ACTIONS_ID_TOKEN_REQUEST_TOKEN \
              -u ACTIONS_ID_TOKEN_REQUEST_URL \
              -u ACTIONS_RUNTIME_TOKEN \
              -u GITHUB_ENV \
              -u GITHUB_OUTPUT \
              -u GITHUB_PATH \
              -u GITHUB_STEP_SUMMARY \
              node scripts/release/verify-release-promotion.mjs \
              --manifest="$RELEASE_MANIFEST" \
              --repository="$GITHUB_REPOSITORY" \
              --expected-kind="$expected_kind" \
              --expected-version="$RELEASE_VERSION" \
              --expected-tag="$RELEASE_TAG"
          fi
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test "$remote_main" = "$RELEASE_REF"
          echo "authorized_ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          echo "release_plan_sha256=$actual_sha256" >> "$GITHUB_OUTPUT"
          echo "run_attempt=$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
          echo "run_id=$GITHUB_RUN_ID" >> "$GITHUB_OUTPUT"

  release-candidate:
    name: Collect exact release candidate without publication authority
    needs: [source-gate, tag, build, release-authorization]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      artifact_id: ${{ steps.candidate-upload.outputs.artifact-id }}
      manifest_sha256: ${{ steps.candidate.outputs.manifest_sha256 }}
      run_attempt: ${{ steps.candidate.outputs.run_attempt }}
      run_id: ${{ steps.candidate.outputs.run_id }}

    steps:
      - name: Checkout immutable release candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pinned Node.js for publication verification
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Verify downloaded manifests and collect release assets
        shell: bash
        env:
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
          VALIDATION_CHANNEL: ${{ inputs.channel == 'release' && 'release' || inputs.channel == 'nightly' && 'nightly' || 'prerelease' }}
        run: |
          args=(
            collect
            --input=artifacts
            --output=release
            --report="${RUNNER_TEMP}/release-publication-report.json"
            --version="${RELEASE_VERSION}"
            --channel="${VALIDATION_CHANNEL}"
            --expected=macos:arm64,macos:x64,linux:x64,windows:x64
          )
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            args+=(
              --trusted-promotion=true
              --repository="$GITHUB_REPOSITORY"
              --source-commit="$RELEASE_REF"
              --tag="$RELEASE_TAG"
              --release-plan="$RELEASE_MANIFEST"
              --release-plan-sha256="$RELEASE_PLAN_SHA256"
              --workflow-run-id="$GITHUB_RUN_ID"
              --workflow-commit="$GITHUB_WORKFLOW_SHA"
              --workflow-source-ref="$GITHUB_REF"
              --run-attempt="$GITHUB_RUN_ATTEMPT"
            )
          fi
          env \
            -u ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -u ACTIONS_ID_TOKEN_REQUEST_URL \
            -u ACTIONS_RUNTIME_TOKEN \
            -u GITHUB_ENV \
            -u GITHUB_OUTPUT \
            -u GITHUB_PATH \
            -u GITHUB_STEP_SUMMARY \
            node apps/browser/scripts/release-publication.mjs "${args[@]}"
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            cp "${RUNNER_TEMP}/release-publication-report.json" \
              "release/clodex-release-publication.json"
          fi

      - name: Publish verified asset summary
        shell: bash
        env:
          PUBLICATION_REPORT: ${{ runner.temp }}/release-publication-report.json
        run: cat "$PUBLICATION_REPORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Re-assert immutable tag target before publication
        shell: bash
        env:
          AUTHORIZED_REF: ${{ needs.release-authorization.outputs.authorized_ref }}
          AUTHORIZED_RELEASE_PLAN_SHA256: ${{ needs.release-authorization.outputs.release_plan_sha256 }}
          EXPECTED_RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
        run: |
          test "$AUTHORIZED_REF" = "$RELEASE_REF"
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            test "$AUTHORIZED_RELEASE_PLAN_SHA256" = "$EXPECTED_RELEASE_PLAN_SHA256"
          else
            test -z "$AUTHORIZED_RELEASE_PLAN_SHA256"
          fi
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          if [ -z "$remote_main" ] || [ "$remote_main" != "$RELEASE_REF" ]; then
            echo "::error::Canonical main moved before publication: expected $RELEASE_REF, got ${remote_main:-missing}"
            exit 1
          fi
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          actual_ref=$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")
          if [ "$actual_ref" != "$RELEASE_REF" ]; then
            echo "::error::Tag $RELEASE_TAG moved or targets the wrong commit: expected $RELEASE_REF, got $actual_ref"
            exit 1
          fi

      - name: Build exact release candidate handoff
        id: candidate
        shell: bash
        env:
          RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          handoff="${RUNNER_TEMP}/release-candidate-handoff"
          rm -rf "$handoff"
          mkdir -m 0700 "$handoff"
          mv release "$handoff/release"
          node - "$handoff/release" "$handoff/manifest.json" <<'NODE'
          const { createHash } = require('node:crypto');
          const fs = require('node:fs');
          const path = require('node:path');
          const [releaseDirectory, outputPath] = process.argv.slice(2);
          const files = fs
            .readdirSync(releaseDirectory, { withFileTypes: true })
            .map((entry) => {
              if (!entry.isFile() || entry.isSymbolicLink()) {
                throw new Error(`release candidate entry is not a regular file: ${entry.name}`);
              }
              if (
                !entry.name ||
                entry.name !== path.basename(entry.name) ||
                entry.name.includes('/') ||
                entry.name.includes('\\')
              ) {
                throw new Error('release candidate filename is invalid');
              }
              const filePath = path.join(releaseDirectory, entry.name);
              const bytes = fs.readFileSync(filePath);
              if (bytes.length === 0) throw new Error('release candidate contains an empty file');
              return {
                bytes: bytes.length,
                fileName: entry.name,
                sha256: createHash('sha256').update(bytes).digest('hex'),
              };
            })
            .sort((left, right) => left.fileName.localeCompare(right.fileName));
          if (files.length === 0) throw new Error('release candidate contains no files');
          const trustedPromotion = process.env.TRUSTED_PROMOTION === 'true';
          const reportName = trustedPromotion ? 'clodex-release-publication.json' : '';
          if (trustedPromotion !== files.some((file) => file.fileName === reportName)) {
            throw new Error('release candidate report binding is invalid');
          }
          fs.writeFileSync(
            outputPath,
            `${JSON.stringify({
              schemaVersion: 1,
              files,
              releasePlanSha256: process.env.RELEASE_PLAN_SHA256,
              reportName,
              sourceCommit: process.env.RELEASE_REF,
              tag: process.env.RELEASE_TAG,
              trustedPromotion,
              workflowRunAttempt: process.env.WORKFLOW_RUN_ATTEMPT,
              workflowRunId: process.env.WORKFLOW_RUN_ID,
            }, null, 2)}\n`,
          );
          NODE
          test -f "$handoff/manifest.json"
          test ! -L "$handoff/manifest.json"
          test -s "$handoff/manifest.json"
          manifest_sha256=$(sha256sum "$handoff/manifest.json" | awk '{print $1}')
          echo "manifest_sha256=$manifest_sha256" >> "$GITHUB_OUTPUT"
          echo "run_attempt=$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
          echo "run_id=$GITHUB_RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Upload exact release candidate handoff
        id: candidate-upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clodex-release-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-candidate-handoff/
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish exact release candidate from a fresh effect runner
    needs: [source-gate, tag, release-authorization, release-candidate]
    runs-on: ubuntu-latest
    concurrency:
      group: github-release-publication-${{ github.repository }}
      cancel-in-progress: false
    environment: Release
    permissions:
      actions: read
      contents: write
    outputs:
      release_id: ${{ steps.release-state.outputs.release_id }}
      report_name: ${{ steps.release-state.outputs.report_name }}

    steps:
      - name: Checkout exact protected publisher source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pinned Node.js for protected publication
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"

      - name: Reject stale authorization or candidate attempts
        shell: bash
        env:
          AUTHORIZED_RUN_ATTEMPT: ${{ needs.release-authorization.outputs.run_attempt }}
          AUTHORIZED_RUN_ID: ${{ needs.release-authorization.outputs.run_id }}
          CANDIDATE_RUN_ATTEMPT: ${{ needs.release-candidate.outputs.run_attempt }}
          CANDIDATE_RUN_ID: ${{ needs.release-candidate.outputs.run_id }}
        run: |
          test "$AUTHORIZED_RUN_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
          test "$AUTHORIZED_RUN_ID" = "$GITHUB_RUN_ID"
          test "$CANDIDATE_RUN_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
          test "$CANDIDATE_RUN_ID" = "$GITHUB_RUN_ID"

      - name: Download exact bounded release candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.release-candidate.outputs.artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/release-candidate

      - name: Verify exact release candidate handoff without repository code
        shell: bash
        env:
          AUTHORIZED_RUN_ATTEMPT: ${{ needs.release-authorization.outputs.run_attempt }}
          AUTHORIZED_RUN_ID: ${{ needs.release-authorization.outputs.run_id }}
          CANDIDATE_RUN_ATTEMPT: ${{ needs.release-candidate.outputs.run_attempt }}
          CANDIDATE_RUN_ID: ${{ needs.release-candidate.outputs.run_id }}
          EXPECTED_MANIFEST_SHA256: ${{ needs.release-candidate.outputs.manifest_sha256 }}
          EXPECTED_RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
        run: |
          test "$AUTHORIZED_RUN_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
          test "$AUTHORIZED_RUN_ID" = "$GITHUB_RUN_ID"
          test "$CANDIDATE_RUN_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
          test "$CANDIDATE_RUN_ID" = "$GITHUB_RUN_ID"
          candidate="${RUNNER_TEMP}/release-candidate"
          test "$(find "$candidate" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')" = "2"
          test -d "$candidate/release"
          test ! -L "$candidate/release"
          test -f "$candidate/manifest.json"
          test ! -L "$candidate/manifest.json"
          test -s "$candidate/manifest.json"
          actual_manifest_sha256=$(sha256sum "$candidate/manifest.json" | awk '{print $1}')
          test "$actual_manifest_sha256" = "$EXPECTED_MANIFEST_SHA256"
          node - "$candidate/release" "$candidate/manifest.json" <<'NODE'
          const { createHash } = require('node:crypto');
          const fs = require('node:fs');
          const path = require('node:path');
          const [releaseDirectory, manifestPath] = process.argv.slice(2);
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          const sha256Pattern = /^[a-f0-9]{64}$/;
          const expectedTrusted = process.env.TRUSTED_PROMOTION === 'true';
          if (
            manifest.schemaVersion !== 1 ||
            manifest.sourceCommit !== process.env.RELEASE_REF ||
            manifest.tag !== process.env.RELEASE_TAG ||
            manifest.releasePlanSha256 !== process.env.EXPECTED_RELEASE_PLAN_SHA256 ||
            manifest.trustedPromotion !== expectedTrusted ||
            manifest.workflowRunAttempt !== process.env.GITHUB_RUN_ATTEMPT ||
            manifest.workflowRunId !== process.env.GITHUB_RUN_ID ||
            manifest.reportName !==
              (expectedTrusted ? 'clodex-release-publication.json' : '') ||
            !Array.isArray(manifest.files) ||
            manifest.files.length === 0
          ) {
            throw new Error('release candidate manifest identity is invalid');
          }
          const expected = new Map();
          for (const file of manifest.files) {
            if (
              !file ||
              typeof file.fileName !== 'string' ||
              file.fileName !== path.basename(file.fileName) ||
              file.fileName.includes('/') ||
              file.fileName.includes('\\') ||
              !Number.isSafeInteger(file.bytes) ||
              file.bytes <= 0 ||
              !sha256Pattern.test(String(file.sha256 ?? '')) ||
              expected.has(file.fileName)
            ) {
              throw new Error('release candidate manifest file record is invalid');
            }
            expected.set(file.fileName, file);
          }
          const entries = fs.readdirSync(releaseDirectory, { withFileTypes: true });
          if (entries.length !== expected.size) {
            throw new Error('release candidate file count differs from the handoff');
          }
          for (const entry of entries) {
            if (!entry.isFile() || entry.isSymbolicLink()) {
              throw new Error('release candidate contains a non-regular entry');
            }
            const record = expected.get(entry.name);
            if (!record) throw new Error('release candidate contains an unexpected file');
            const bytes = fs.readFileSync(path.join(releaseDirectory, entry.name));
            const digest = createHash('sha256').update(bytes).digest('hex');
            if (bytes.length !== record.bytes || digest !== record.sha256) {
              throw new Error('release candidate bytes differ from the handoff');
            }
          }
          NODE

      - name: Reauthorize exact write target before publication
        shell: bash
        env:
          AUTHORIZED_REF: ${{ needs.release-authorization.outputs.authorized_ref }}
          AUTHORIZED_RELEASE_PLAN_SHA256: ${{ needs.release-authorization.outputs.release_plan_sha256 }}
          AUTHORIZED_RUN_ATTEMPT: ${{ needs.release-authorization.outputs.run_attempt }}
          AUTHORIZED_RUN_ID: ${{ needs.release-authorization.outputs.run_id }}
          CANDIDATE_RUN_ATTEMPT: ${{ needs.release-candidate.outputs.run_attempt }}
          CANDIDATE_RUN_ID: ${{ needs.release-candidate.outputs.run_id }}
          EXPECTED_RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
        run: |
          test "$AUTHORIZED_REF" = "$RELEASE_REF"
          test "$AUTHORIZED_RUN_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
          test "$AUTHORIZED_RUN_ID" = "$GITHUB_RUN_ID"
          test "$CANDIDATE_RUN_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
          test "$CANDIDATE_RUN_ID" = "$GITHUB_RUN_ID"
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            test "$AUTHORIZED_RELEASE_PLAN_SHA256" = "$EXPECTED_RELEASE_PLAN_SHA256"
            actual_sha256=$(shasum -a 256 "$RELEASE_MANIFEST" | awk '{print $1}')
            test "$actual_sha256" = "$EXPECTED_RELEASE_PLAN_SHA256"
          else
            test -z "$AUTHORIZED_RELEASE_PLAN_SHA256"
            test -z "$EXPECTED_RELEASE_PLAN_SHA256"
            test -z "$RELEASE_MANIFEST"
          fi
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          test "$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")" = "$RELEASE_REF"

      - name: Create a new isolated protected draft by exact release ID
        id: protected-draft
        shell: bash
        env:
          AUTHORIZED_REF: ${{ needs.release-authorization.outputs.authorized_ref }}
          AUTHORIZED_RELEASE_PLAN_SHA256: ${{ needs.release-authorization.outputs.release_plan_sha256 }}
          EXPECTED_RELEASE_PLAN_SHA256: ${{ needs.source-gate.outputs.release_plan_sha256 }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_ASSETS_DIRECTORY: ${{ runner.temp }}/release-candidate/release
          RELEASE_MANIFEST: ${{ inputs.manifest }}
          RELEASE_NOTES: ${{ needs.tag.outputs.notes }}
          RELEASE_PRERELEASE: ${{ inputs.channel != 'release' }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
        run: |
          test "$AUTHORIZED_REF" = "$RELEASE_REF"
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            test "$AUTHORIZED_RELEASE_PLAN_SHA256" = "$EXPECTED_RELEASE_PLAN_SHA256"
            actual_sha256=$(shasum -a 256 "$RELEASE_MANIFEST" | awk '{print $1}')
            test "$actual_sha256" = "$EXPECTED_RELEASE_PLAN_SHA256"
          else
            test -z "$AUTHORIZED_RELEASE_PLAN_SHA256"
          fi
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          test "$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")" = "$RELEASE_REF"
          step_output="$GITHUB_OUTPUT"
          printf '%s\n' "$RELEASE_NOTES" > "${RUNNER_TEMP}/release-notes.md"
          report_name=""
          if [ "$TRUSTED_PROMOTION" = "true" ]; then
            report_name="clodex-release-publication.json"
          fi
          trusted_publisher=$(mktemp "${RUNNER_TEMP}/create-protected-release-draft.XXXXXX.mjs")
          publisher_output=$(mktemp "${RUNNER_TEMP}/protected-release-output.XXXXXX")
          git show "${RELEASE_REF}:scripts/release/create-protected-release-draft.mjs" \
            > "$trusted_publisher"
          test -f "$trusted_publisher"
          test ! -L "$trusted_publisher"
          test -s "$trusted_publisher"
          env \
            -u ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -u ACTIONS_ID_TOKEN_REQUEST_URL \
            -u ACTIONS_RUNTIME_TOKEN \
            -u GITHUB_ENV \
            -u GITHUB_OUTPUT \
            -u GITHUB_PATH \
            -u GITHUB_STEP_SUMMARY \
            node "$trusted_publisher" \
            --assets="$RELEASE_ASSETS_DIRECTORY" \
            --body-file="${RUNNER_TEMP}/release-notes.md" \
            --github-output="$publisher_output" \
            --name="Clodex Agentic IDE ${RELEASE_VERSION}" \
            --prerelease="$RELEASE_PRERELEASE" \
            --report-name="$report_name" \
            --repository="$GITHUB_REPOSITORY" \
            --tag="$RELEASE_TAG" \
            --target-commitish="$RELEASE_REF"
          test "$(wc -l < "$publisher_output" | tr -d ' ')" = "2"
          grep -Eq '^release_id=[1-9][0-9]*$' "$publisher_output"
          grep -Eq '^report_name=([A-Za-z0-9._-]+)?$' "$publisher_output"
          cat "$publisher_output" >> "$step_output"

      - name: Finalize exact non-trusted prerelease after complete draft upload
        id: public-release
        if: needs.source-gate.outputs.trusted_promotion != 'true' && inputs.draft == false
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMMUTABLE_RELEASES_ENABLED: ${{ vars.CLODEX_IMMUTABLE_RELEASES_ENABLED }}
          RELEASE_CHANNEL_INPUT: ${{ inputs.channel }}
          RELEASE_ID: ${{ steps.protected-draft.outputs.release_id }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          case "$RELEASE_CHANNEL_INPUT" in
            alpha|beta|nightly) ;;
            *)
              echo "::error::Only alpha, beta, and nightly may use automatic prerelease finalization"
              exit 1
              ;;
          esac
          if [[ ! "$RELEASE_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Protected draft publisher did not return an exact GitHub Release ID"
            exit 1
          fi
          if [ "$IMMUTABLE_RELEASES_ENABLED" != "true" ]; then
            echo "::error::Set repository variable CLODEX_IMMUTABLE_RELEASES_ENABLED=true only after enabling immutable releases"
            exit 1
          fi
          # GitHub rejects If-Match on Update Release PATCH requests. This
          # exact-ID GET and verification run under the shared automation mutex
          # and protected Release environment. Privileged repository admins are
          # explicit trusted writers because this endpoint offers no CAS header.
          gh api \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            > "${RUNNER_TEMP}/protected-draft.json"
          cat > "${RUNNER_TEMP}/verify-exact-prerelease.cjs" <<'NODE'
          const fs = require('node:fs');
          const [releasePath, expectedState] = process.argv.slice(2);
          const release = JSON.parse(fs.readFileSync(releasePath, 'utf8'));
          const candidate = JSON.parse(
            fs.readFileSync(`${process.env.RUNNER_TEMP}/release-candidate/manifest.json`, 'utf8'),
          );
          const expectedBody = fs.readFileSync(`${process.env.RUNNER_TEMP}/release-notes.md`, 'utf8');
          const expectedId = Number.parseInt(process.env.RELEASE_ID, 10);
          const expectedDraft = expectedState === 'draft';
          const expectedApiUrl = `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/releases/${expectedId}`;
          if (
            !Number.isSafeInteger(release.id) ||
            release.id !== expectedId ||
            release.url !== expectedApiUrl ||
            release.tag_name !== process.env.RELEASE_TAG ||
            release.target_commitish !== process.env.RELEASE_REF ||
            release.name !== `Clodex Agentic IDE ${process.env.RELEASE_VERSION}` ||
            release.body !== expectedBody ||
            release.draft !== expectedDraft ||
            release.prerelease !== true ||
            (expectedDraft
              ? release.published_at !== null || release.immutable !== false
              : !Number.isFinite(Date.parse(release.published_at)) || release.immutable !== true)
          ) {
            throw new Error(`GitHub Release does not match the exact ${expectedState} prerelease identity`);
          }
          const expectedAssets = new Map(
            candidate.files.map((file) => [file.fileName, file]),
          );
          if (expectedAssets.size !== candidate.files.length) {
            throw new Error('exact prerelease candidate contains duplicate asset names');
          }
          if (!Array.isArray(release.assets) || release.assets.length !== expectedAssets.size) {
            throw new Error('GitHub Release asset count differs from the exact prerelease candidate');
          }
          for (const asset of release.assets) {
            const expected = expectedAssets.get(asset.name);
            if (
              !expected ||
              asset.state !== 'uploaded' ||
              asset.size !== expected.bytes ||
              asset.digest !== `sha256:${expected.sha256}`
            ) {
              throw new Error('GitHub Release assets differ from the exact prerelease candidate');
            }
            expectedAssets.delete(asset.name);
          }
          if (expectedAssets.size !== 0) {
            throw new Error('GitHub Release is missing exact prerelease candidate assets');
          }
          NODE
          node "${RUNNER_TEMP}/verify-exact-prerelease.cjs" \
            "${RUNNER_TEMP}/protected-draft.json" draft
          node - \
            "${RUNNER_TEMP}/release-notes.md" \
            "${RUNNER_TEMP}/finalize-prerelease.json" <<'NODE'
          const fs = require('node:fs');
          const [notesPath, outputPath] = process.argv.slice(2);
          fs.writeFileSync(
            outputPath,
            `${JSON.stringify({
              body: fs.readFileSync(notesPath, 'utf8'),
              draft: false,
              make_latest: 'false',
              name: `Clodex Agentic IDE ${process.env.RELEASE_VERSION}`,
              prerelease: true,
              tag_name: process.env.RELEASE_TAG,
              target_commitish: process.env.RELEASE_REF,
            })}\n`,
            { mode: 0o600 },
          );
          NODE
          emit_stderr_file() {
            local label="$1"
            local path="$2"
            if [ -s "$path" ]; then
              printf '%s\n' "$label" >&2
              cat "$path" >&2
            fi
          }
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          pre_effect_tag_commit=$(git rev-parse --verify \
            "refs/tags/${RELEASE_TAG}^{commit}")
          if ! test "$pre_effect_tag_commit" = "$RELEASE_REF"; then
            echo "::error::Tag $RELEASE_TAG moved before publication: expected $RELEASE_REF, got $pre_effect_tag_commit"
            exit 1
          fi
          # GitHub's immutable-release settings endpoint requires
          # Administration:read, which GITHUB_TOKEN cannot receive. The
          # repository variable and protected Release approval are therefore
          # the explicit trusted-operator attestation; no privileged PAT is
          # introduced into this public release workflow.
          patch_status=0
          gh api --method PATCH \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            --input "${RUNNER_TEMP}/finalize-prerelease.json" \
            > "${RUNNER_TEMP}/finalized-prerelease-response.json" \
            2> "${RUNNER_TEMP}/finalized-prerelease-error.txt" || patch_status=$?
          response_verify_status=0
          if [ "$patch_status" -eq 0 ]; then
            node "${RUNNER_TEMP}/verify-exact-prerelease.cjs" \
              "${RUNNER_TEMP}/finalized-prerelease-response.json" published \
              2> "${RUNNER_TEMP}/finalized-prerelease-response-error.txt" || response_verify_status=$?
          fi
          terminal_get_status=0
          gh api \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            > "${RUNNER_TEMP}/finalized-prerelease.json" \
            2> "${RUNNER_TEMP}/finalized-prerelease-get-error.txt" || terminal_get_status=$?
          terminal_verify_status=0
          if [ "$terminal_get_status" -eq 0 ]; then
            node "${RUNNER_TEMP}/verify-exact-prerelease.cjs" \
              "${RUNNER_TEMP}/finalized-prerelease.json" published \
              2> "${RUNNER_TEMP}/finalized-prerelease-verify-error.txt" || terminal_verify_status=$?
          fi
          if [ "$terminal_get_status" -ne 0 ] || [ "$terminal_verify_status" -ne 0 ]; then
            emit_stderr_file \
              "GitHub Release PATCH stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-error.txt"
            emit_stderr_file \
              "GitHub Release PATCH response verification stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-response-error.txt"
            emit_stderr_file \
              "Terminal GitHub Release GET stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-get-error.txt"
            emit_stderr_file \
              "Terminal GitHub Release verification stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-verify-error.txt"
            echo "::error::Prerelease publication outcome is uncertain; no second PATCH was attempted"
            exit 1
          fi
          terminal_tag_fetch_status=0
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" \
            2> "${RUNNER_TEMP}/finalized-prerelease-tag-fetch-error.txt" || terminal_tag_fetch_status=$?
          terminal_tag_resolve_status=0
          terminal_tag_commit=""
          if [ "$terminal_tag_fetch_status" -eq 0 ]; then
            terminal_tag_commit=$(git rev-parse --verify \
              "refs/tags/${RELEASE_TAG}^{commit}" \
              2> "${RUNNER_TEMP}/finalized-prerelease-tag-resolve-error.txt") || terminal_tag_resolve_status=$?
          fi
          if [ "$terminal_tag_fetch_status" -ne 0 ] || \
            [ "$terminal_tag_resolve_status" -ne 0 ] || \
            [ "$terminal_tag_commit" != "$RELEASE_REF" ]; then
            emit_stderr_file \
              "GitHub Release PATCH stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-error.txt"
            emit_stderr_file \
              "GitHub Release PATCH response verification stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-response-error.txt"
            emit_stderr_file \
              "Terminal tag fetch stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-tag-fetch-error.txt"
            emit_stderr_file \
              "Terminal tag resolution stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-tag-resolve-error.txt"
            echo "::error::Published tag $RELEASE_TAG does not resolve to exact source SHA $RELEASE_REF (got ${terminal_tag_commit:-missing})"
            exit 1
          fi
          if [ "$patch_status" -ne 0 ] || [ "$response_verify_status" -ne 0 ]; then
            emit_stderr_file \
              "GitHub Release PATCH stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-error.txt"
            emit_stderr_file \
              "GitHub Release PATCH response verification stderr:" \
              "${RUNNER_TEMP}/finalized-prerelease-response-error.txt"
            echo "::warning::Finalization response was uncertain; recovered the exact published prerelease and tag SHA by release ID"
          fi
          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: Query and assert exact live release state
        id: release-state
        shell: bash
        env:
          EXPECTED_DRAFT: ${{ needs.source-gate.outputs.trusted_promotion == 'true' || inputs.draft }}
          EXPECTED_PRERELEASE: ${{ inputs.channel != 'release' }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.protected-draft.outputs.release_id }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release-notes.md
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
          TRUSTED_PROMOTION: ${{ needs.source-gate.outputs.trusted_promotion }}
        run: |
          if [[ ! "$RELEASE_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Publisher did not return an exact GitHub Release ID"
            exit 1
          fi
          gh api --method GET \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            > "${RUNNER_TEMP}/created-release.json"
          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          terminal_tag_commit=$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")
          test "$terminal_tag_commit" = "$RELEASE_REF"
          node - <<'NODE'
          const fs = require('node:fs');
          const release = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/created-release.json`, 'utf8'));
          const candidate = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/release-candidate/manifest.json`, 'utf8'));
          const expectedId = Number.parseInt(process.env.RELEASE_ID, 10);
          const expectedDraft = process.env.EXPECTED_DRAFT === 'true';
          const expectedPrerelease = process.env.EXPECTED_PRERELEASE === 'true';
          const expectedBody = fs.readFileSync(process.env.RELEASE_NOTES_FILE, 'utf8');
          const expectedApiUrl = `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/releases/${expectedId}`;
          if (
            !Number.isSafeInteger(release.id) ||
            release.id <= 0 ||
            release.id !== expectedId ||
            release.url !== expectedApiUrl ||
            release.tag_name !== process.env.RELEASE_TAG ||
            release.target_commitish !== process.env.RELEASE_REF ||
            release.name !== `Clodex Agentic IDE ${process.env.RELEASE_VERSION}` ||
            release.body !== expectedBody ||
            release.draft !== expectedDraft ||
            release.prerelease !== expectedPrerelease ||
            (expectedDraft
              ? release.published_at !== null || release.immutable !== false
              : !Number.isFinite(Date.parse(release.published_at)) || release.immutable !== true)
          ) {
            throw new Error('created GitHub Release does not match the manifest-derived state');
          }
          const expectedAssets = new Map(
            candidate.files.map((file) => [file.fileName, file]),
          );
          if (!Array.isArray(release.assets) || release.assets.length !== expectedAssets.size) {
            throw new Error('created GitHub Release asset count differs from the exact candidate');
          }
          for (const asset of release.assets) {
            const expected = expectedAssets.get(asset.name);
            if (
              !expected ||
              asset.state !== 'uploaded' ||
              asset.size !== expected.bytes ||
              asset.digest !== `sha256:${expected.sha256}`
            ) {
              throw new Error('created GitHub Release assets differ from the exact candidate');
            }
            expectedAssets.delete(asset.name);
          }
          if (expectedAssets.size !== 0) {
            throw new Error('created GitHub Release is missing exact candidate assets');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `release_id=${release.id}\n`);
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `report_name=${process.env.TRUSTED_PROMOTION === 'true' ? 'clodex-release-publication.json' : ''}\n`,
          );
          NODE

  attest-publication:
    name: Attest verified live release publication
    needs: [source-gate, release]
    if: needs.source-gate.outputs.trusted_promotion == 'true'
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/release-publication-attestation.yml
    with:
      release_id: ${{ fromJSON(needs.release.outputs.release_id) }}
      report_name: ${{ needs.release.outputs.report_name }}
      source_commit: ${{ inputs.ref }}
      tag: ${{ inputs.tag }}

  verify-stable-draft:
    name: Verify pre-attested stable draft; publication NOT_READY
    needs: [source-gate, release, attest-publication]
    if: inputs.channel == 'release' && needs.source-gate.outputs.trusted_promotion == 'true'
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      actions: read
      attestations: read
      contents: read
    steps:
      - name: Checkout exact canonical release source without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require exact current canonical main before draft verification
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          test "$GITHUB_REPOSITORY" = "mereyabdenbekuly-ctrl/clodex-ide"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_SHA" = "$RELEASE_REF"
          test "$GITHUB_WORKFLOW_SHA" = "$RELEASE_REF"
          test "$(git rev-parse HEAD)" = "$RELEASE_REF"
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$remote_main" = "$RELEASE_REF"

      - name: Download the exact attested publication snapshot artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.attest-publication.outputs.snapshot_artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/attested-publication

      - name: Verify exact attested publication snapshot handoff
        env:
          EXPECTED_SHA256: ${{ needs.attest-publication.outputs.snapshot_sha256 }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          snapshot_dir="${RUNNER_TEMP}/attested-publication"
          entry_count=$(find "$snapshot_dir" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')
          test "$entry_count" = "1"
          snapshot="${snapshot_dir}/publication-snapshot.json"
          test -f "$snapshot"
          test ! -L "$snapshot"
          test -s "$snapshot"
          actual_sha256=$(sha256sum "$snapshot" | awk '{print $1}')
          test "$actual_sha256" = "$EXPECTED_SHA256"
          gh attestation verify "$snapshot" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-publication-attestation.yml" \
            --source-ref refs/heads/main \
            --source-digest "$RELEASE_REF" \
            --signer-digest "$RELEASE_REF" \
            --deny-self-hosted-runners

      - name: Download and verify the exact attested stable draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ needs.release.outputs.release_id }}
          RELEASE_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          REPORT_NAME: ${{ needs.release.outputs.report_name }}
        run: |
          mkdir -p "${RUNNER_TEMP}/release-assets"
          gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            > "${RUNNER_TEMP}/release-draft.json"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "${RUNNER_TEMP}/release-assets" \
            --clobber
          report="${RUNNER_TEMP}/release-assets/${REPORT_NAME}"
          report_source=$(node -p 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).sourceCommit' "$report")
          report_workflow=$(node -p 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).workflow.commit' "$report")
          test "$report_source" = "$RELEASE_REF"
          gh attestation verify "$report" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-publication-attestation.yml" \
            --source-ref refs/heads/main \
            --source-digest "$report_source" \
            --signer-digest "$report_workflow" \
            --deny-self-hosted-runners
          node scripts/release/verify-release-publication.mjs \
            --assets="${RUNNER_TEMP}/release-assets" \
            --expected-release-state=draft \
            --expected-source-commit="$RELEASE_REF" \
            --expected-tag="$RELEASE_TAG" \
            --release-id="$RELEASE_ID" \
            --release-json="${RUNNER_TEMP}/release-draft.json" \
            --report="$report" \
            --report-name="$REPORT_NAME" \
            --repository="$GITHUB_REPOSITORY" \
            --snapshot="${RUNNER_TEMP}/current-publication-snapshot.json"
          cmp \
            "${RUNNER_TEMP}/attested-publication/publication-snapshot.json" \
            "${RUNNER_TEMP}/current-publication-snapshot.json"

      - name: Block stable publication without a CAS-capable publisher
        shell: bash
        run: |
          echo "::error::Stable publication is NOT_READY: a separately reviewed publisher with a documented conditional/CAS transition is required."
          exit 1

  trigger-nightly-after-stable:
    name: Trigger nightly after stable
    needs: verify-stable-draft
    if: inputs.channel == 'release' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Dispatch nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/nightly-release.yml/dispatches" \
            -d '{"ref":"main","inputs":{"ref":"main"}}'
