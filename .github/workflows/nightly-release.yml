name: "Nightly Release"

on:
  schedule:
    # Run daily at 03:00 UTC. The workflow skips if main has not changed
    # since the latest nightly tag reachable from main.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: "Release source (must be exactly main)"
        required: false
        type: string
        default: main
      date:
        description: "Nightly date override (YYYYMMDD)"
        required: false
        type: string
      counter:
        description: "Nightly counter override (1-999)"
        required: false
        type: string

run-name: "Nightly Release: ${{ inputs.ref || 'main' }}"

permissions:
  contents: read

jobs:
  should-release:
    name: Check for main changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - name: Require canonical main source
        env:
          RELEASE_REF_INPUT: ${{ inputs.ref || 'main' }}
        run: |
          test "$GITHUB_REPOSITORY" = "mereyabdenbekuly-ctrl/clodex-ide"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$RELEASE_REF_INPUT" = "main"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Require exact current main HEAD
        run: |
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 {print $1}')
          test -n "$remote_main"
          test "$(git rev-parse HEAD)" = "$remote_main"
          test "$GITHUB_SHA" = "$remote_main"
          test "$GITHUB_WORKFLOW_SHA" = "$remote_main"

      - name: Check latest nightly tag
        id: check
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$RELEASE_EVENT_NAME" != "schedule" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_nightly_tag=$(git tag \
            --list 'clodex@*-nightly*' \
            --merged HEAD \
            --sort=-version:refname \
            | head -n 1)

          if [ -z "$latest_nightly_tag" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_nightly_commit=$(git rev-list -n 1 "$latest_nightly_tag")
          current_commit=$(git rev-parse HEAD)

          if [ "$latest_nightly_commit" = "$current_commit" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  version:
    name: Compute nightly version
    needs: should-release
    if: needs.should-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_ref: ${{ steps.version.outputs.release_ref }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute version
        id: version
        env:
          NIGHTLY_DATE: ${{ inputs.date }}
          NIGHTLY_COUNTER: ${{ inputs.counter }}
        run: |
          ARGS=(--github-output)
          if [ -n "$NIGHTLY_DATE" ]; then
            ARGS+=(--date "$NIGHTLY_DATE")
          fi
          if [ -n "$NIGHTLY_COUNTER" ]; then
            ARGS+=(--counter "$NIGHTLY_COUNTER")
          fi
          pnpm tsx scripts/release/nightly-version.ts "${ARGS[@]}" >> "$GITHUB_OUTPUT"
          echo "release_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release-nightly:
    name: Release nightly
    needs: version
    permissions:
      contents: write
      actions: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/_release-browser.yml
    with:
      version: ${{ needs.version.outputs.version }}
      tag: ${{ needs.version.outputs.tag }}
      channel: nightly
      ref: ${{ needs.version.outputs.release_ref }}
    secrets: inherit
